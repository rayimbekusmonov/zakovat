
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: var(--font-sans); color: var(--color-text-primary); font-size: 12px; }
  .container { padding: 10px 0; }
  h1 { font-size: 14px; font-weight: 500; margin-bottom: 2px; text-align: center; }
  .subtitle { font-size: 11px; color: var(--color-text-secondary); text-align: center; margin-bottom: 10px; }
  .round-tabs { display: flex; gap: 4px; flex-wrap: wrap; margin-bottom: 10px; justify-content: center; }
  .tab-btn { padding: 4px 10px; border-radius: 6px; border: 1px solid var(--color-border-secondary); background: var(--color-background-secondary); color: var(--color-text-secondary); font-size: 11px; cursor: pointer; font-family: var(--font-sans); transition: all .15s; }
  .tab-btn.active { background: #534AB7; border-color: #534AB7; color: #EEEDFE; }
  .round-panel { display: none; }
  .round-panel.active { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; }
  .team-card { border: 1px solid var(--color-border-tertiary); border-radius: 8px; overflow: hidden; }
  .team-header { padding: 5px 8px; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid var(--color-border-tertiary); }
  .team-title { font-size: 11px; font-weight: 500; }
  .team-count { font-size: 10px; padding: 1px 5px; border-radius: 99px; }
  .count-6 { background: #EEEDFE; color: #3C3489; }
  .count-5 { background: var(--color-background-secondary); color: var(--color-text-secondary); }
  .team-members { padding: 4px 8px 6px; }
  .member { display: flex; align-items: center; gap: 5px; padding: 2px 0; font-size: 11px; border-bottom: 1px solid var(--color-border-tertiary); }
  .member:last-child { border-bottom: none; }
  .member-id { font-size: 10px; color: var(--color-text-tertiary); min-width: 16px; }
  .member-name { flex: 1; line-height: 1.3; }
  .cap-badge { font-size: 9px; background: #FAEEDA; color: #633806; padding: 1px 4px; border-radius: 99px; white-space: nowrap; }
  .legend { display: flex; gap: 10px; justify-content: center; margin-bottom: 8px; font-size: 11px; color: var(--color-text-secondary); }
  .legend-item { display: flex; align-items: center; gap: 4px; }
  .dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
  .dot-cap { background: #EF9F27; }
  .dot-big { background: #7F77DD; }
</style>
<div class="container">
  <h1>Zakovat Turniri — Jamoalar Jadvali</h1>
  <p class="subtitle">42 ishtirokchi · 8 jamoa · 6 tur</p>
  <div class="legend">
    <div class="legend-item"><div class="dot dot-cap"></div><span>Kapitan</span></div>
    <div class="legend-item"><div class="dot dot-big"></div><span>6 kishilik jamoa ★</span></div>
  </div>
  <div class="round-tabs" id="tabs"></div>
  <div id="panels"></div>
</div>
<script>
const names = {
  1:"Nurmuhammad",2:"Bobirmirzo",3:"Samandar",4:"Manguberdi",
  5:"Adhamjon",6:"Muzaffar aka",7:"Jahongir",8:"Oybek",
  9:"Oxunjon",10:"Po'latova Dildora",11:"Muhammadjavohir Jo'rayev",
  12:"Umida Ikmatullayeva",13:"Maxamatkarimov Muzaffar",
  14:"Fozilxo'jayev A'zamxo'ja",15:"Muslima Muzaffarova",
  16:"Rustambekova Shahlo",17:"Bekchanova Manzura",
  18:"Hamidov Ubaydullo",19:"Zahro Norbo'tayeva",
  20:"Abdurahimov Jahongir",21:"Normuhammadov Oyatilloh",
  22:"Mirjon Imomov",23:"Akbarov Alisher",24:"Safarova Mehrinoz",
  25:"Voxidov Akbarjon",26:"Mansurov Xushnud",27:"Madiyorova Saida",
  28:"G'ulomov Mirjalol",29:"Muxtorjon Ortiqov",30:"Ilyos Abduqahorov",
  31:"Ro'ziboyev Abrorbek",32:"Kamoliddinov Abdulaziz",
  33:"Ikromboyev Davron",34:"Ergashov Muhammad",
  35:"Habibulloyeva Muslimaxon",36:"Sanobar Ibroximova",
  37:"Tojialiyeva Gullola",38:"Shaxobiddinova Gulsanamxon",
  39:"Ro'ziyev Avazxon",40:"Abduqahhor Bo'ronov",
  41:"Mansurov Husan",42:"Ozoda Tolibjonova"
};

const schedule = [
  {1:[14,21,28,31,33],2:[9,19,24,27,37],3:[15,23,29,34],4:[18,25,39,42],5:[22,26,35,41],6:[16,20,30,38],7:[11,13,17,40],8:[10,12,32,36]},
  {1:[9,16,35,39],2:[10,11,23,38],3:[13,20,29,31,37],4:[14,25,27,34,41],5:[22,24,28,30],6:[21,26,36,42],7:[12,19,33,40],8:[15,17,18,32]},
  {1:[20,21,27,39],2:[9,10,28,41],3:[12,13,14,15],4:[16,18,26,31],5:[11,32,33,35,37],6:[17,19,30,34,36],7:[24,29,38,42],8:[22,23,25,40]},
  {1:[9,12,18,29],2:[10,16,24,25],3:[17,33,39,41],4:[11,20,26,34],5:[27,28,32,40],6:[14,36,37,38],7:[13,21,23,30,35],8:[15,19,22,31,42]},
  {1:[16,19,29,32,41],2:[15,20,28,35,36],3:[18,30,37,40],4:[11,14,24,39],5:[10,21,22,34],6:[13,27,33,42],7:[12,17,23,26],8:[9,25,31,38]},
  {1:[11,25,29,36],2:[9,20,22,32],3:[15,21,38,40,41],4:[13,19,26,28,39],5:[12,27,30,31],6:[18,24,33,34],7:[16,23,37,42],8:[10,14,17,35]}
];

const teamColors = ['#534AB7','#0F6E56','#993C1D','#993556','#185FA5','#3B6D11','#854F0B','#5F5E5A'];
const teamBg = ['#EEEDFE','#E1F5EE','#FAECE7','#FBEAF0','#E6F1FB','#EAF3DE','#FAEEDA','#F1EFE8'];

const tabs = document.getElementById('tabs');
const panels = document.getElementById('panels');

schedule.forEach((round, ri) => {
  const btn = document.createElement('button');
  btn.className = 'tab-btn' + (ri===0?' active':'');
  btn.textContent = `${ri+1}-tur`;
  btn.onclick = () => {
    document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
    document.querySelectorAll('.round-panel').forEach(p=>p.classList.remove('active'));
    btn.classList.add('active');
    document.getElementById('panel-'+ri).classList.add('active');
  };
  tabs.appendChild(btn);

  const panel = document.createElement('div');
  panel.className = 'round-panel' + (ri===0?' active':'');
  panel.id = 'panel-'+ri;

  for(let t=1;t<=8;t++) {
    const members = round[t];
    const total = members.length + 1;
    const isBig = total === 6;

    const card = document.createElement('div');
    card.className = 'team-card';
    card.style.borderTopColor = teamColors[t-1];
    card.style.borderTopWidth = '2px';

    const header = document.createElement('div');
    header.className = 'team-header';
    header.style.background = teamBg[t-1] + '44';
    header.innerHTML = `<span class="team-title" style="color:${teamColors[t-1]}">Jamoa ${t}</span><span class="team-count ${isBig?'count-6':'count-5'}">${total}${isBig?' ★':''}</span>`;
    card.appendChild(header);

    const list = document.createElement('div');
    list.className = 'team-members';

    const capRow = document.createElement('div');
    capRow.className = 'member';
    capRow.innerHTML = `<span class="member-id">${t}</span><span class="member-name">${names[t]}</span><span class="cap-badge">Cap</span>`;
    list.appendChild(capRow);

    members.forEach(pid => {
      const row = document.createElement('div');
      row.className = 'member';
      row.innerHTML = `<span class="member-id">${pid}</span><span class="member-name">${names[pid]}</span>`;
      list.appendChild(row);
    });

    card.appendChild(list);
    panel.appendChild(card);
  }
  panels.appendChild(panel);
});
</script>
